openapi: 3.0.0
info:
  title: API de Fluxo de Caixa
  version: 1.0.0
paths:
  /v1/lancamentos:
    post:
      summary: Registra um novo débito ou crédito
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                valor: {type: number}
                tipo: {type: string, enum: [debito, credito]}
                descricao: {type: string}
      responses:
        '201':
          description: Lançamento recebido com sucesso
  /v1/consolidado/diario:
    get:
      summary: Consulta o saldo consolidado do dia
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: {type: string, format: date}
                  saldo_total: {type: number}

