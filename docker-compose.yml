version: '3.8'

services:
  database:
    image: postgres:15-alpine
    environment:
      - POSTGRES_USER=admin
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=fluxodecaixa
    ports:
      - "5432:5432"

  broker:
    image: rabbitmq:3-management-alpine
    ports:
      - "5672:5672"   # AMQP
      - "15672:15672" # Painel de Controle

  cache:
    image: redis:alpine
    ports:
      - "6379:6379"

networks:
  default:
    name: cashflow-network

